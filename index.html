<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mappa Eventi Viterbo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }

    #map {
      height: 100vh;
      width: 100%;
    }

    .panel {
      position: absolute;
      z-index: 999;
      background: white;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      width: 220px;
    }

    input, select, button {
      width: 100%;
      margin-bottom: 8px;
      padding: 6px;
    }
  </style>
</head>

<body>

<!-- FORM -->
<div class="panel">
  <h3>Aggiungi Evento</h3>

  <input id="title" placeholder="Titolo">

  <select id="category">
    <option value="music">Musica</option>
    <option value="food">Food</option>
    <option value="culture">Cultura</option>
    <option value="sport">Sport</option>
  </select>

  <input id="lat" placeholder="Latitudine">
  <input id="lng" placeholder="Longitudine">

  <button onclick="addEvent()">Salva evento</button>
</div>

<!-- MAPPA -->
<div id="map"></div>

<script>
  const SUPABASE_URL = "https://TUO-PROJECT-URL.supabase.co";
  const SUPABASE_KEY = "sb_publishable_q1QxiWruBpfFl5EQwpgHQQ_RptPsj6A";

  const map = L.map('map').setView([42.4200, 12.1040], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  function getColor(category) {
    switch(category) {
      case "music": return "red";
      case "food": return "green";
      case "culture": return "blue";
      case "sport": return "orange";
      default: return "gray";
    }
  }

  async function loadEvents() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/events?select=*`, {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    });

    const eventi = await res.json();

    eventi.forEach(e => {
      L.circleMarker([e.lat, e.lng], {
        radius: 8,
        color: getColor(e.category),
        fillOpacity: 0.8
      })
      .addTo(map)
      .bindPopup(`<b>${e.title}</b>`);
    });
  }

  loadEvents();

  async function addEvent() {
    const title = document.getElementById("title").value;
    const category = document.getElementById("category").value;
    const lat = parseFloat(document.getElementById("lat").value);
    const lng = parseFloat(document.getElementById("lng").value);

    await fetch(`${SUPABASE_URL}/rest/v1/events`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({
        title,
        category,
        lat,
        lng
      })
    });

    alert("Evento salvato!");
    location.reload();
  }
</script>

</body>
</html>
