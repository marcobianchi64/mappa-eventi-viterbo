<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mappa Eventi Viterbo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>

<body>
<div id="map"></div>

<script>
  const map = L.map('map').setView([42.4200, 12.1040], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  function getColor(category) {
    switch(category) {
      case "music": return "red";
      case "food": return "green";
      case "culture": return "blue";
      case "sport": return "orange";
      default: return "gray";
    }
  }

  const eventi = [
    {
      title: "Concerto Live",
      category: "music",
      lat: 42.4200,
      lng: 12.1040
    },
    {
      title: "Serata Food & Wine",
      category: "food",
      lat: 42.3000,
      lng: 12.0800
    },
    {
      title: "Mostra d'arte",
      category: "culture",
      lat: 42.4500,
      lng: 12.1500
    }
  ];

  eventi.forEach(e => {
    L.circleMarker([e.lat, e.lng], {
      radius: 8,
      color: getColor(e.category),
      fillOpacity: 0.8
    })
    .addTo(map)
    .bindPopup(`<b>${e.title}</b>`);
  });

</script>

</body>
</html>
