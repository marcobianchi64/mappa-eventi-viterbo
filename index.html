<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Project Atlas - Eventi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root { --panel-width:310px; --shadow:0 3px 14px rgba(0,0,0,.22); --blue:#1f6feb; --text:#1f2937; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,sans-serif; color:var(--text); }
    #map { height:100vh; width:100%; }
    .panel { position:absolute; top:12px; left:12px; z-index:1000; width:var(--panel-width); max-height:calc(100vh - 24px); overflow-y:auto; background:#fff; padding:14px; border-radius:14px; box-shadow:var(--shadow); }
    .panel h1 { margin:0 0 4px; font-size:20px; }
    .panel p { margin:0 0 12px; font-size:13px; color:#555; line-height:1.35; }
    .quick-tools { display:grid; grid-template-columns:1fr; gap:8px; margin:12px 0; }
    .quick-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .panel input,.panel select,.panel textarea,.quick-tools input { width:100%; padding:9px; border:1px solid #cfcfcf; border-radius:8px; font:inherit; }
    .panel label { display:block; margin:10px 0 4px; font-size:13px; font-weight:700; }
    .panel textarea { min-height:70px; resize:vertical; }
    .panel button,.quick-tools button { width:100%; padding:9px; border:0; border-radius:8px; background:var(--blue); color:white; font-weight:700; cursor:pointer; font:inherit; }
    .quick-tools button.secondary { background:#111827; }
    .quick-tools button.light { background:#eef2ff; color:#1f2937; }
    .panel button.submit { margin-top:12px; }
    .hint { margin-top:10px; font-size:12px; color:#666; line-height:1.35; }
    .status { margin-top:10px; font-size:13px; font-weight:700; }
    .status.error { color:#b42318; } .status.success { color:#167a38; }
    .legend { margin-top:12px; padding-top:10px; border-top:1px solid #eee; display:grid; grid-template-columns:1fr 1fr; gap:6px; font-size:12px; color:#444; }
    .legend-item { display:flex; align-items:center; gap:6px; white-space:nowrap; }
    .legend-dot { width:12px; height:12px; border-radius:50%; display:inline-block; }
    .atlas-marker { width:34px; height:34px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); display:flex; align-items:center; justify-content:center; border:2px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.35); }
    .atlas-marker span { transform:rotate(45deg); font-size:16px; color:#fff; font-weight:bold; text-shadow:0 1px 2px rgba(0,0,0,.3); }
    .draft-marker { background:#1f6feb; width:34px; height:34px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); border:2px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.35); }
    .event-card { width:265px; }
    .event-card img { display:block; width:100%; height:135px; margin:0 0 10px; object-fit:cover; border-radius:8px; background:#f2f4f7; }
    .event-card h3 { margin:0 0 7px; font-size:17px; line-height:1.25; }
    .event-card p { margin:5px 0; font-size:13px; line-height:1.35; }
    .badge { display:inline-block; padding:4px 8px; margin-bottom:8px; color:#fff; border-radius:999px; font-size:12px; font-weight:700; }
    .event-card a.action,.event-card button.action { display:block; width:100%; margin-top:8px; padding:8px 10px; color:#fff; border:0; border-radius:8px; font:inherit; font-weight:700; text-decoration:none; text-align:center; cursor:pointer; }
    .event-card a.official { background:var(--blue); } .event-card button.share { background:#111827; }
    .event-preview { width:220px; }
    .event-preview img { width:100%; height:90px; object-fit:cover; border-radius:7px; margin-bottom:6px; background:#f2f4f7; }
    .event-preview strong { display:block; margin-bottom:4px; font-size:14px; line-height:1.25; }
    .event-preview span { display:block; font-size:12px; color:#555; line-height:1.3; }
    @media (max-width:650px){ .panel{ top:8px; left:8px; width:calc(100% - 16px); max-height:48vh; } }
  </style>
</head>
<body>
  <aside class="panel">
    <h1>Project Atlas</h1>
    <p>Scopri cosa succede vicino a te. Gli eventi inviati dal modulo entrano in revisione prima della pubblicazione.</p>
    <div class="quick-tools">
      <input id="searchPlace" placeholder="Cerca una località, es. Celleno">
      <div class="quick-row">
        <button id="searchPlaceButton" type="button" class="secondary">Cerca</button>
        <button id="nearMeButton" type="button" class="light">Vicino a me</button>
      </div>
    </div>
    <label for="title">Titolo evento</label><input id="title" placeholder="Es. Concerto in piazza">
    <label for="category">Categoria</label>
    <select id="category"><option value="music">Musica</option><option value="food">Enogastronomia</option><option value="culture">Cultura</option><option value="other">Altri eventi</option></select>
    <label for="start_date">Inizio</label><input id="start_date" type="datetime-local">
    <label for="end_date">Fine</label><input id="end_date" type="datetime-local">
    <label for="venue">Luogo</label><input id="venue" placeholder="Es. Piazza San Lorenzo">
    <label for="event_url">Pagina ufficiale dell'evento</label><input id="event_url" type="url" placeholder="https://...">
    <label for="image_url">Immagine dell'evento (facoltativa)</label><input id="image_url" type="url" placeholder="https://...">
    <label for="description">Breve descrizione (facoltativa)</label><textarea id="description" placeholder="Informazioni utili sull'evento"></textarea>
    <label for="lat">Latitudine</label><input id="lat" placeholder="Clicca sulla mappa" readonly>
    <label for="lng">Longitudine</label><input id="lng" placeholder="Clicca sulla mappa" readonly>
    <button id="saveButton" class="submit" type="button">Invia evento per revisione</button>
    <div class="hint">Clicca sulla mappa per impostare automaticamente la posizione.</div>
    <div id="status" class="status" aria-live="polite"></div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#d92d20"></span>Musica</div>
      <div class="legend-item"><span class="legend-dot" style="background:#2e8b57"></span>Enogastronomia</div>
      <div class="legend-item"><span class="legend-dot" style="background:#2f6fed"></span>Cultura</div>
      <div class="legend-item"><span class="legend-dot" style="background:#7a5af8"></span>Altri eventi</div>
    </div>
  </aside>
  <div id="map"></div>
<script>
const SUPABASE_URL="https://gdyhkuvrncztjguvxofg.supabase.co";
const SUPABASE_KEY="sb_publishable_q1QxiWruBpfFl5EQwpgHQQ_RptPsj6A";
const EVENTS_ENDPOINT=`${SUPABASE_URL}/rest/v1/events`;
const map=L.map("map").setView([42.4200,12.1040],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{ attribution:"&copy; OpenStreetMap contributors" }).addTo(map);
let draftMarker=null,userMarker=null;
function getColor(category){ switch(category){ case "music":return "#d92d20"; case "food":return "#2e8b57"; case "culture":return "#2f6fed"; case "other":return "#7a5af8"; default:return "#667085"; } }
function getCategoryLabel(category){ switch(category){ case "music":return "Musica"; case "food":return "Enogastronomia"; case "culture":return "Cultura"; case "other":return "Altri eventi"; default:return "Evento"; } }
function getCategoryIcon(category){ switch(category){ case "music":return "♪"; case "food":return "🍷"; case "culture":return "⌂"; case "other":return "★"; default:return "•"; } }
function createMarkerIcon(category){ return L.divIcon({ className:"", html:`<div class="atlas-marker" style="background:${getColor(category)}"><span>${getCategoryIcon(category)}</span></div>`, iconSize:[34,34], iconAnchor:[17,34], popupAnchor:[0,-30], tooltipAnchor:[0,-30] }); }
function createDraftIcon(){ return L.divIcon({ className:"", html:`<div class="draft-marker"></div>`, iconSize:[34,34], iconAnchor:[17,34], popupAnchor:[0,-30] }); }
function escapeHtml(value){ return String(value||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
function formatDate(value){ if(!value)return ""; const date=new Date(value); if(Number.isNaN(date.getTime()))return escapeHtml(value); return date.toLocaleString("it-IT",{dateStyle:"medium",timeStyle:"short"}); }
function isVisibleNow(event){ if(event.verified!==true)return false; const now=new Date(); const start=event.start_date?new Date(event.start_date):null; const end=event.end_date?new Date(event.end_date):start; if(!start||Number.isNaN(start.getTime()))return false; if(end&&end<now)return false; const visibleFrom=new Date(start); visibleFrom.setDate(visibleFrom.getDate()-15); return now>=visibleFrom; }
function createEventShareUrl(event){ const id=encodeURIComponent(event.date_event||""); return `${window.location.origin}${window.location.pathname}?event=${id}`; }
function createEventCard(event){
  const title=escapeHtml(event.title), venue=escapeHtml(event.venue), description=escapeHtml(event.description), categoryLabel=getCategoryLabel(event.category), categoryColor=getColor(event.category), shareUrl=createEventShareUrl(event);
  const image=event.image_url?`<img src="${escapeHtml(event.image_url)}" alt="${title}" onerror="this.remove()">`:"";
  const dateText=event.start_date?`<p><strong>Inizio:</strong> ${formatDate(event.start_date)}</p>`:"";
  const endText=event.end_date?`<p><strong>Fine:</strong> ${formatDate(event.end_date)}</p>`:"";
  const venueText=venue?`<p><strong>Luogo:</strong> ${venue}</p>`:"";
  const descriptionText=description?`<p>${description}</p>`:"";
  const link=event.event_url?`<a class="action official" href="${escapeHtml(event.event_url)}" target="_blank" rel="noopener noreferrer">Vedi evento ufficiale →</a>`:"";
  return `<div class="event-card">${image}<span class="badge" style="background:${categoryColor}">${categoryLabel}</span><h3>${title}</h3>${dateText}${endText}${venueText}${descriptionText}<button class="action share" onclick="shareEvent('${encodeURIComponent(event.title||"Evento")}','${encodeURIComponent(shareUrl)}')">Invita / Condividi</button>${link}</div>`;
}
function createTooltip(event){ const title=escapeHtml(event.title), venue=escapeHtml(event.venue); const image=event.image_url?`<img src="${escapeHtml(event.image_url)}" alt="${title}" onerror="this.remove()">`:""; return `<div class="event-preview">${image}<strong>${title}</strong><span>${formatDate(event.start_date)}</span>${venue?`<span>${venue}</span>`:""}</div>`; }
function addEventMarker(event){
  if(!Number.isFinite(Number(event.lat))||!Number.isFinite(Number(event.lng)))return;
  const marker=L.marker([event.lat,event.lng],{icon:createMarkerIcon(event.category)}).addTo(map);
  marker.bindTooltip(createTooltip(event),{direction:"top",offset:[0,-8],opacity:.98,sticky:true});
  marker.bindPopup(createEventCard(event),{maxWidth:290});
  const selectedEventId=new URLSearchParams(window.location.search).get("event");
  if(selectedEventId&&event.date_event&&selectedEventId===String(event.date_event)){ map.setView([event.lat,event.lng],14); setTimeout(()=>marker.openPopup(),500); }
}
async function loadEvents(){ try{ const response=await fetch(`${EVENTS_ENDPOINT}?select=*&verified=eq.true&order=start_date.asc`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}}); if(!response.ok)throw new Error("Impossibile caricare gli eventi."); const events=await response.json(); events.filter(isVisibleNow).forEach(addEventMarker); }catch(error){ console.error(error); } }
function setStatus(message,type=""){ const status=document.getElementById("status"); status.textContent=message; status.className=`status ${type}`; }
function shareEvent(encodedTitle,encodedUrl){ const title=decodeURIComponent(encodedTitle), url=decodeURIComponent(encodedUrl), text=`Ti invito a vedere questo evento: ${title}`; if(navigator.share){ navigator.share({title,text,url}).catch(()=>{}); }else{ window.open(`https://wa.me/?text=${encodeURIComponent(text+" "+url)}`,"_blank"); } }
function setDraftPosition(lat,lng){ document.getElementById("lat").value=Number(lat).toFixed(6); document.getElementById("lng").value=Number(lng).toFixed(6); if(draftMarker)map.removeLayer(draftMarker); draftMarker=L.marker([lat,lng],{icon:createDraftIcon()}).addTo(map).bindPopup("Posizione selezionata per il nuovo evento").openPopup(); setStatus("Posizione selezionata.","success"); }
map.on("click",event=>setDraftPosition(event.latlng.lat,event.latlng.lng));
async function searchPlace(){ const query=document.getElementById("searchPlace").value.trim(); if(!query){ setStatus("Inserisci una località da cercare.","error"); return; } setStatus("Ricerca località in corso..."); try{ const response=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`); const results=await response.json(); if(!results||results.length===0){ setStatus("Località non trovata.","error"); return; } map.setView([Number(results[0].lat),Number(results[0].lon)],13); setStatus("Località trovata.","success"); }catch(error){ console.error(error); setStatus("Ricerca non riuscita.","error"); } }
function goNearMe(){ if(!navigator.geolocation){ setStatus("Geolocalizzazione non disponibile su questo dispositivo.","error"); return; } setStatus("Cerco la tua posizione..."); navigator.geolocation.getCurrentPosition(pos=>{ const lat=pos.coords.latitude,lng=pos.coords.longitude; map.setView([lat,lng],13); if(userMarker)map.removeLayer(userMarker); userMarker=L.circleMarker([lat,lng],{radius:7,color:"#fff",weight:2,fillColor:"#111827",fillOpacity:1}).addTo(map).bindPopup("Sei qui"); setStatus("Mappa centrata sulla tua posizione.","success"); },()=>setStatus("Non ho potuto rilevare la posizione.","error"),{enableHighAccuracy:true,timeout:8000}); }
async function addEvent(){
  const button=document.getElementById("saveButton"), title=document.getElementById("title").value.trim(), category=document.getElementById("category").value, startDate=document.getElementById("start_date").value, endDate=document.getElementById("end_date").value, venue=document.getElementById("venue").value.trim(), eventUrl=document.getElementById("event_url").value.trim(), imageUrl=document.getElementById("image_url").value.trim(), description=document.getElementById("description").value.trim(), lat=Number(document.getElementById("lat").value), lng=Number(document.getElementById("lng").value);
  if(!title||!startDate||!Number.isFinite(lat)||!Number.isFinite(lng)){ setStatus("Inserisci titolo, data di inizio e posizione sulla mappa.","error"); return; }
  if(endDate&&new Date(endDate)<new Date(startDate)){ setStatus("La data di fine non può essere precedente alla data di inizio.","error"); return; }
  button.disabled=true; button.textContent="Invio in corso..."; setStatus("");
  const payload={ title, category, start_date:new Date(startDate).toISOString(), end_date:endDate?new Date(endDate).toISOString():null, venue:venue||null, event_url:eventUrl||null, image_url:imageUrl||null, description:description||null, lat, lng, verified:false, review_status:"pending", source_id:null };
  try{ const response=await fetch(EVENTS_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json",Prefer:"return=minimal",apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`},body:JSON.stringify(payload)}); if(!response.ok){ const details=await response.text(); throw new Error(details||"Errore durante l'invio."); } setStatus("Evento inviato: sarà pubblicato dopo la revisione.","success"); ["title","start_date","end_date","venue","event_url","image_url","description","lat","lng"].forEach(id=>document.getElementById(id).value=""); if(draftMarker){ map.removeLayer(draftMarker); draftMarker=null; } }catch(error){ console.error(error); setStatus("Invio non riuscito. Riprova più tardi.","error"); }finally{ button.disabled=false; button.textContent="Invia evento per revisione"; }
}
document.getElementById("saveButton").addEventListener("click",addEvent);
document.getElementById("searchPlaceButton").addEventListener("click",searchPlace);
document.getElementById("nearMeButton").addEventListener("click",goNearMe);
document.getElementById("searchPlace").addEventListener("keydown",event=>{ if(event.key==="Enter")searchPlace(); });
loadEvents();
</script>
</body>
</html>
