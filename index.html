<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Mappa Eventi Viterbo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --panel-width: 300px;
      --shadow: 0 3px 14px rgba(0, 0, 0, 0.22);
      --blue: #1f6feb;
      --text: #1f2937;
      --muted: #667085;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      width: var(--panel-width);
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      background: #fff;
      padding: 14px;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .panel h1 {
      margin: 0 0 4px;
      font-size: 20px;
    }

    .panel p {
      margin: 0 0 14px;
      font-size: 13px;
      color: #555;
      line-height: 1.35;
    }

    .panel label {
      display: block;
      margin: 10px 0 4px;
      font-size: 13px;
      font-weight: 700;
    }

    .panel input,
    .panel select,
    .panel textarea,
    .panel button {
      width: 100%;
      padding: 9px;
      border: 1px solid #cfcfcf;
      border-radius: 7px;
      font: inherit;
    }

    .panel textarea {
      min-height: 70px;
      resize: vertical;
    }

    .panel button {
      margin-top: 12px;
      border: 0;
      background: var(--blue);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .panel button:hover { background: #1557b0; }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      line-height: 1.35;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .status.error { color: #b42318; }
    .status.success { color: #167a38; }

    .legend {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 12px;
      color: #444;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .atlas-marker {
      width: 34px;
      height: 34px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .atlas-marker span {
      transform: rotate(45deg);
      font-size: 16px;
      line-height: 1;
      color: #fff;
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .draft-marker {
      background: #1f6feb;
      width: 34px;
      height: 34px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .event-card {
      width: 260px;
    }

    .event-card img {
      display: block;
      width: 100%;
      height: 135px;
      margin: 0 0 10px;
      object-fit: cover;
      border-radius: 8px;
      background: #f2f4f7;
    }

    .event-card h3 {
      margin: 0 0 7px;
      font-size: 17px;
      line-height: 1.25;
    }

    .event-card p {
      margin: 5px 0;
      font-size: 13px;
      line-height: 1.35;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      margin-bottom: 8px;
      color: #fff;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .event-card a.action {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 10px;
      color: #fff;
      background: var(--blue);
      border-radius: 7px;
      font-weight: 700;
      text-decoration: none;
    }

    .event-preview {
      width: 210px;
    }

    .event-preview img {
      width: 100%;
      height: 90px;
      object-fit: cover;
      border-radius: 7px;
      margin-bottom: 6px;
      background: #f2f4f7;
    }

    .event-preview strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      line-height: 1.25;
    }

    .event-preview span {
      display: block;
      font-size: 12px;
      color: #555;
      line-height: 1.3;
    }

    @media (max-width: 650px) {
      .panel {
        top: 8px;
        left: 8px;
        width: calc(100% - 16px);
        max-height: 47vh;
      }
    }
  </style>
</head>

<body>
  <aside class="panel">
    <h1>Eventi in provincia di Viterbo</h1>
    <p>Gli eventi inviati dal modulo entrano in revisione prima della pubblicazione.</p>

    <label for="title">Titolo evento</label>
    <input id="title" placeholder="Es. Concerto in piazza" />

    <label for="category">Categoria</label>
    <select id="category">
      <option value="music">Musica</option>
      <option value="food">Enogastronomia</option>
      <option value="culture">Cultura</option>
      <option value="other">Altri eventi</option>
    </select>

    <label for="start_date">Inizio</label>
    <input id="start_date" type="datetime-local" />

    <label for="end_date">Fine</label>
    <input id="end_date" type="datetime-local" />

    <label for="venue">Luogo</label>
    <input id="venue" placeholder="Es. Piazza San Lorenzo" />

    <label for="event_url">Pagina ufficiale dell'evento</label>
    <input id="event_url" type="url" placeholder="https://..." />

    <label for="image_url">Immagine dell'evento (facoltativa)</label>
    <input id="image_url" type="url" placeholder="https://..." />

    <label for="description">Breve descrizione (facoltativa)</label>
    <textarea id="description" placeholder="Informazioni utili sull'evento"></textarea>

    <label for="lat">Latitudine</label>
    <input id="lat" placeholder="Clicca sulla mappa" readonly />

    <label for="lng">Longitudine</label>
    <input id="lng" placeholder="Clicca sulla mappa" readonly />

    <button id="saveButton" type="button">Invia evento per revisione</button>

    <div class="hint">Clicca sulla mappa per impostare automaticamente la posizione.</div>
    <div id="status" class="status" aria-live="polite"></div>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#d92d20"></span>Musica</div>
      <div class="legend-item"><span class="legend-dot" style="background:#2e8b57"></span>Enogastronomia</div>
      <div class="legend-item"><span class="legend-dot" style="background:#2f6fed"></span>Cultura</div>
      <div class="legend-item"><span class="legend-dot" style="background:#7a5af8"></span>Altri eventi</div>
    </div>
  </aside>

  <div id="map"></div>

  <script>
    const SUPABASE_URL = "https://gdyhkuvrncztjguvxofg.supabase.co";
    const SUPABASE_KEY = "sb_publishable_q1QxiWruBpfFl5EQwpgHQQ_RptPsj6A";
    const EVENTS_ENDPOINT = `${SUPABASE_URL}/rest/v1/events`;

    const map = L.map("map").setView([42.4200, 12.1040], 10);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let draftMarker = null;

    function getColor(category) {
      switch (category) {
        case "music": return "#d92d20";
        case "food": return "#2e8b57";
        case "culture": return "#2f6fed";
        case "other": return "#7a5af8";
        default: return "#667085";
      }
    }

    function getCategoryLabel(category) {
      switch (category) {
        case "music": return "Musica";
        case "food": return "Enogastronomia";
        case "culture": return "Cultura";
        case "other": return "Altri eventi";
        default: return "Evento";
      }
    }

    function getCategoryIcon(category) {
      switch (category) {
        case "music": return "♪";
        case "food": return "🍷";
        case "culture": return "⌂";
        case "other": return "★";
        default: return "•";
      }
    }

    function createMarkerIcon(category) {
      const color = getColor(category);
      const icon = getCategoryIcon(category);

      return L.divIcon({
        className: "",
        html: `<div class="atlas-marker" style="background:${color}"><span>${icon}</span></div>`,
        iconSize: [34, 34],
        iconAnchor: [17, 34],
        popupAnchor: [0, -30],
        tooltipAnchor: [0, -30]
      });
    }

    function createDraftIcon() {
      return L.divIcon({
        className: "",
        html: `<div class="draft-marker"></div>`,
        iconSize: [34, 34],
        iconAnchor: [17, 34],
        popupAnchor: [0, -30]
      });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return escapeHtml(value);

      return date.toLocaleString("it-IT", {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    function isVisibleNow(event) {
      if (event.verified !== true) return false;

      const now = new Date();
      const start = event.start_date ? new Date(event.start_date) : null;
      const end = event.end_date ? new Date(event.end_date) : start;

      if (!start || Number.isNaN(start.getTime())) return false;
      if (end && end < now) return false;

      const visibleFrom = new Date(start);
      visibleFrom.setDate(visibleFrom.getDate() - 15);

      return now >= visibleFrom;
    }

    function createEventCard(event) {
      const title = escapeHtml(event.title);
      const venue = escapeHtml(event.venue);
      const description = escapeHtml(event.description);
      const categoryLabel = getCategoryLabel(event.category);
      const categoryColor = getColor(event.category);

      const image = event.image_url
        ? `<img src="${escapeHtml(event.image_url)}" alt="${title}" onerror="this.remove()">`
        : "";

      const dateText = event.start_date
        ? `<p><strong>Inizio:</strong> ${formatDate(event.start_date)}</p>`
        : "";

      const endText = event.end_date
        ? `<p><strong>Fine:</strong> ${formatDate(event.end_date)}</p>`
        : "";

      const venueText = venue
        ? `<p><strong>Luogo:</strong> ${venue}</p>`
        : "";

      const descriptionText = description
        ? `<p>${description}</p>`
        : "";

      const link = event.event_url
        ? `<a class="action" href="${escapeHtml(event.event_url)}" target="_blank" rel="noopener noreferrer">Vedi evento ufficiale →</a>`
        : "";

      return `
        <div class="event-card">
          ${image}
          <span class="badge" style="background:${categoryColor}">${categoryLabel}</span>
          <h3>${title}</h3>
          ${dateText}
          ${endText}
          ${venueText}
          ${descriptionText}
          ${link}
        </div>
      `;
    }

    function createTooltip(event) {
      const title = escapeHtml(event.title);
      const venue = escapeHtml(event.venue);
      const image = event.image_url
        ? `<img src="${escapeHtml(event.image_url)}" alt="${title}" onerror="this.remove()">`
        : "";

      return `
        <div class="event-preview">
          ${image}
          <strong>${title}</strong>
          <span>${formatDate(event.start_date)}</span>
          ${venue ? `<span>${venue}</span>` : ""}
        </div>
      `;
    }

    function addEventMarker(event) {
      if (!Number.isFinite(Number(event.lat)) || !Number.isFinite(Number(event.lng))) {
        return;
      }

      const marker = L.marker([event.lat, event.lng], {
        icon: createMarkerIcon(event.category)
      }).addTo(map);

      marker.bindTooltip(createTooltip(event), {
        direction: "top",
        offset: [0, -8],
        opacity: 0.98,
        sticky: true
      });

      marker.bindPopup(createEventCard(event), { maxWidth: 285 });
    }

    async function loadEvents() {
      try {
        const response = await fetch(
          `${EVENTS_ENDPOINT}?select=*&verified=eq.true&order=start_date.asc`,
          {
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        if (!response.ok) {
          throw new Error("Impossibile caricare gli eventi.");
        }

        const events = await response.json();
        events.filter(isVisibleNow).forEach(addEventMarker);
      } catch (error) {
        console.error(error);
      }
    }

    function setStatus(message, type = "") {
      const status = document.getElementById("status");
      status.textContent = message;
      status.className = `status ${type}`;
    }

    map.on("click", (event) => {
      const lat = event.latlng.lat.toFixed(6);
      const lng = event.latlng.lng.toFixed(6);

      document.getElementById("lat").value = lat;
      document.getElementById("lng").value = lng;

      if (draftMarker) {
        map.removeLayer(draftMarker);
      }

      draftMarker = L.marker([lat, lng], {
        icon: createDraftIcon()
      })
        .addTo(map)
        .bindPopup("Posizione selezionata per il nuovo evento")
        .openPopup();

      setStatus("Posizione selezionata.", "success");
    });

    async function addEvent() {
      const button = document.getElementById("saveButton");
      const title = document.getElementById("title").value.trim();
      const category = document.getElementById("category").value;
      const startDate = document.getElementById("start_date").value;
      const endDate = document.getElementById("end_date").value;
      const venue = document.getElementById("venue").value.trim();
      const eventUrl = document.getElementById("event_url").value.trim();
      const imageUrl = document.getElementById("image_url").value.trim();
      const description = document.getElementById("description").value.trim();
      const lat = Number(document.getElementById("lat").value);
      const lng = Number(document.getElementById("lng").value);

      if (!title || !startDate || !Number.isFinite(lat) || !Number.isFinite(lng)) {
        setStatus("Inserisci titolo, data di inizio e posizione sulla mappa.", "error");
        return;
      }

      if (endDate && new Date(endDate) < new Date(startDate)) {
        setStatus("La data di fine non può essere precedente alla data di inizio.", "error");
        return;
      }

      button.disabled = true;
      button.textContent = "Invio in corso...";
      setStatus("");

      const payload = {
        title,
        category,
        start_date: new Date(startDate).toISOString(),
        end_date: endDate ? new Date(endDate).toISOString() : null,
        venue: venue || null,
        event_url: eventUrl || null,
        image_url: imageUrl || null,
        description: description || null,
        lat,
        lng,
        verified: false,
        review_status: "pending",
        source_id: null
      };

      try {
        const response = await fetch(EVENTS_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Prefer: "return=minimal",
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const details = await response.text();
          throw new Error(details || "Errore durante l'invio.");
        }

        setStatus("Evento inviato: sarà pubblicato dopo la revisione.", "success");

        document.getElementById("title").value = "";
        document.getElementById("start_date").value = "";
        document.getElementById("end_date").value = "";
        document.getElementById("venue").value = "";
        document.getElementById("event_url").value = "";
        document.getElementById("image_url").value = "";
        document.getElementById("description").value = "";
        document.getElementById("lat").value = "";
        document.getElementById("lng").value = "";

        if (draftMarker) {
          map.removeLayer(draftMarker);
          draftMarker = null;
        }
      } catch (error) {
        console.error(error);
        setStatus("Invio non riuscito. Riprova più tardi.", "error");
      } finally {
        button.disabled = false;
        button.textContent = "Invia evento per revisione";
      }
    }

    document.getElementById("saveButton").addEventListener("click", addEvent);
    loadEvents();
  </script>
</body>
</html>
